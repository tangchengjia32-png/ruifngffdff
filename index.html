<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>贪吃蛇</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="container">
    <h1>贪吃蛇</h1>
    <p class="hint">方向键 / WASD 控制移动，空格暂停继续，Enter 重新开始。</p>
    <section class="panel">
      <div class="stat">分数：<span id="score">0</span></div>
      <div class="stat">最高分：<span id="best">0</span></div>
      <div id="status" class="status">准备开始</div>
    </section>
    <canvas id="game" width="400" height="400" aria-label="贪吃蛇游戏画布"></canvas>
    <button id="restart" type="button">重新开始</button>
  </main>

  <script src="game.js"></script>
</body>
</html>
